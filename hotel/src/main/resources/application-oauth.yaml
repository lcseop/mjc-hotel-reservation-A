# OAuth 설정은 oauth 프로필을 활성화한 경우에만 적용됩니다.
# 실제 Client ID와 Client Secret은 저장소에 저장하지 않고 환경변수로 주입합니다.
spring:
  config:
    activate:
      on-profile: oauth
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            scope:
              - openid
              - profile
              - email
            client-name: Google

staynow:
  oauth2:
    frontend-callback-url: ${OAUTH2_FRONTEND_CALLBACK_URL:http://localhost/oauth-callback.html}
