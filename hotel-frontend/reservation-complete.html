<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reservation.css">
    <title>예약 완료</title>
</head>
<body>
    <navbar>
        <div id="header"></div>
    </navbar>

    <main class="complete-page">
        <section class="complete-hero">
            <div class="stepper complete-stepper" aria-label="예약 단계">
                <span class="done"><i class="fa-solid fa-check"></i> 호텔 선택</span>
                <b></b>
                <span class="done"><i class="fa-solid fa-check"></i> 객실 선택</span>
                <b></b>
                <span class="done"><i class="fa-solid fa-check"></i> 예약 정보 입력</span>
                <b></b>
                <span class="done"><i class="fa-solid fa-check"></i> 결제</span>
                <b></b>
                <span class="active"><i class="fa-solid fa-check"></i> 예약 완료</span>
            </div>

            <div class="success-box">
                <div class="success-icon"><i class="fa-solid fa-check"></i></div>
                <h1>예약이 완료되었습니다!</h1>
                <p id="completeMessage">예약 정보를 불러오는 중입니다.</p>
                <span id="completeReservationNumber">예약번호 확인 중</span>
            </div>
        </section>

        <div class="complete-layout">
            <section class="card complete-detail">
                <div class="section-heading">
                    <h2>예약 상세 정보</h2>
                    <button type="button" id="printBtn"><i class="fa-solid fa-print"></i> 인쇄</button>
                </div>

                <div class="complete-hotel">
                    <div class="hotel-icon"><i class="fa-solid fa-hotel"></i></div>
                    <div>
                        <p id="completeStars">☆☆☆☆☆</p>
                        <h3 id="completeHotel">호텔명</h3>
                        <span id="completeLocation">위치 정보</span>
                    </div>
                </div>

                <dl class="detail-list">
                    <div><dt>예약 번호</dt><dd id="detailReservationNumber">-</dd></div>
                    <div><dt>체크인</dt><dd id="detailCheckIn">-</dd></div>
                    <div><dt>체크아웃</dt><dd id="detailCheckOut">-</dd></div>
                    <div><dt>숙박</dt><dd id="detailNights">-</dd></div>
                    <div><dt>객실</dt><dd id="detailRoom">-</dd></div>
                    <div><dt>투숙객</dt><dd id="detailGuest">-</dd></div>
                    <div><dt>결제 수단</dt><dd id="detailPayment">신한카드 테스트 결제</dd></div>
                    <div><dt>최종 결제 금액</dt><dd id="detailAmount">₩0</dd></div>
                </dl>
            </section>

            <aside class="complete-side">
                <article class="card qr-card">
                    <h2>체크인 QR코드</h2>
                    <div class="qr-box" id="qrBox">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                    <strong id="qrNumber">QR 확인 중</strong>
                    <p>체크인 시 프런트에 제시해주세요</p>
                </article>

                <article class="card info-card">
                    <h2>체크인 안내</h2>
                    <div><i class="fa-regular fa-clock"></i><span>오후 3:00 / 오전 11:00</span></div>
                    <div><i class="fa-solid fa-location-dot"></i><span id="guideAddress">호텔 주소</span></div>
                    <div><i class="fa-solid fa-phone"></i><span>02-1234-5678</span></div>
                    <div><i class="fa-solid fa-car"></i><span>주차 가능 여부는 호텔 정책을 확인해주세요</span></div>
                </article>
            </aside>
        </div>

        <section class="complete-actions">
            <a href="index.html" class="primary-action"><i class="fa-solid fa-house"></i> 홈으로 돌아가기</a>
            <a href="hotel-search.html" class="secondary-action"><i class="fa-solid fa-magnifying-glass"></i> 다른 호텔 둘러보기</a>
        </section>
    </main>

    <footer>
        <div id="footer"></div>
    </footer>

    <script src="js/jquery.min.js"></script>
    <script src="js/include.js"></script>
    <script src="js/reservation-complete.js"></script>
    <script src="component/header.js"></script>
</body>
</html>
