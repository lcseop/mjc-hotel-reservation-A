<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" type="image/png" href="images/icon/Favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>비밀번호 재설정 | StayNow</title>
</head>
<body>
    <navbar>
        <div id="header"></div>
    </navbar>

    <main>
        <div class="login-page">
            <div class="login-card reset-card">
                <div class="login-logo">
                    <img class="auth-logo-img" src="images/logo/Logo_Normal.png" alt="StayNow">
                </div>

                <h3>비밀번호 재설정</h3>
                <span class="sub-title">
                    회원가입한 이메일을 인증하고 새 비밀번호를 설정하세요.
                </span>

                <ol class="reset-progress" aria-label="비밀번호 재설정 단계">
                    <li class="active" data-progress="1">1. 이메일</li>
                    <li data-progress="2">2. 인증</li>
                    <li data-progress="3">3. 재설정</li>
                </ol>

                <section id="resetStep1" class="reset-step">
                    <div class="input-group">
                        <label for="resetEmail">이메일</label>
                        <input id="resetEmail" type="email" autocomplete="email" placeholder="회원가입한 이메일">
                    </div>
                    <button id="sendResetCodeBtn" type="button" class="login-btn">
                        인증번호 발송
                    </button>
                    <p class="reset-guide">가입된 LOCAL 계정의 이메일로만 인증번호를 받을 수 있습니다.</p>
                </section>

                <section id="resetStep2" class="reset-step" hidden>
                    <p id="resetCodeGuide" class="reset-notice"></p>
                    <div class="input-group">
                        <label for="resetCode">인증번호</label>
                        <input id="resetCode" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="6자리 인증번호">
                    </div>
                    <button id="verifyResetCodeBtn" type="button" class="login-btn">
                        인증번호 확인
                    </button>
                    <button id="resendResetCodeBtn" type="button" class="reset-secondary-btn">
                        인증번호 다시 받기
                    </button>
                </section>

                <section id="resetStep3" class="reset-step" hidden>
                    <div class="input-group">
                        <label for="newPassword">새 비밀번호</label>
                        <input id="newPassword" type="password" autocomplete="new-password" placeholder="8자 이상">
                    </div>
                    <div class="input-group">
                        <label for="newPasswordConfirm">새 비밀번호 확인</label>
                        <input id="newPasswordConfirm" type="password" autocomplete="new-password" placeholder="비밀번호를 다시 입력">
                    </div>
                    <button id="confirmPasswordResetBtn" type="button" class="login-btn">
                        비밀번호 변경
                    </button>
                </section>

                <div class="signup reset-login-link">
                    비밀번호가 기억났나요?
                    <a href="login.html">로그인으로 돌아가기</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div id="footer"></div>
    </footer>

    <script src="js/include.js"></script>
    <script src="js/jquery.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/forgot-password.js"></script>
    <script src="component/header.js"></script>
</body>
</html>
