<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" type="image/png" href="images/icon/Favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/forgot-password.css">
    <title>비밀번호 찾기 | StayNow</title>
</head>
<body>
    <navbar>
        <div id="header"></div>
    </navbar>

    <main>
        <div class="forgot-page">
            <section class="forgot-card" aria-labelledby="forgotTitle">
                <div class="forgot-logo">
                    <img class="auth-logo-img" src="images/logo/Logo_Normal.png" alt="StayNow">
                </div>

                <h3 id="forgotTitle">비밀번호를 다시 설정할게요</h3>
                <p class="sub-title">가입한 이메일로 인증번호를 받은 뒤 새 비밀번호를 입력해주세요.</p>

                <ol class="reset-steps" aria-label="비밀번호 재설정 단계">
                    <li class="step is-active" data-step="email">
                        <span>1</span>
                        <strong>이메일 인증</strong>
                    </li>
                    <li class="step" data-step="code">
                        <span>2</span>
                        <strong>인증번호 확인</strong>
                    </li>
                    <li class="step" data-step="password">
                        <span>3</span>
                        <strong>새 비밀번호</strong>
                    </li>
                </ol>

                <form id="forgotPasswordForm" novalidate>
                    <div class="input-group">
                        <label for="resetEmail">이메일</label>
                        <div class="field-row">
                            <input
                                    type="email"
                                    id="resetEmail"
                                    placeholder="가입한 이메일을 입력하세요"
                                    autocomplete="email">
                            <button type="button" class="inline-btn" id="sendResetCodeBtn">인증번호 발송</button>
                        </div>
                        <p class="field-message" id="emailGuide">이메일 입력 후 인증번호를 발송해주세요.</p>
                    </div>

                    <div class="verify-panel" id="verifyPanel" hidden>
                        <div class="panel-head">
                            <span class="panel-icon">✓</span>
                            <div>
                                <strong>인증번호를 입력해주세요</strong>
                                <p>메일함에서 6자리 인증번호를 확인해주세요.</p>
                            </div>
                        </div>

                        <div class="field-row">
                            <input
                                    type="text"
                                    id="resetCode"
                                    placeholder="인증번호 6자리"
                                    maxlength="6"
                                    inputmode="numeric"
                                    autocomplete="one-time-code">
                            <button type="button" class="inline-btn secondary" id="confirmResetCodeBtn">확인</button>
                        </div>
                        <p class="field-message" id="codeGuide">인증번호는 일정 시간이 지나면 만료될 수 있습니다.</p>
                    </div>

                    <div class="password-panel" id="passwordPanel" hidden>
                        <div class="input-group">
                            <label for="newPassword">새 비밀번호</label>
                            <div class="password-box">
                                <input
                                        type="password"
                                        id="newPassword"
                                        placeholder="8자 이상 입력해주세요"
                                        autocomplete="new-password">
                                <button type="button" class="toggle-password" data-target="#newPassword">👁</button>
                            </div>
                            <div class="password-meter">
                                <span></span>
                            </div>
                            <p class="field-message" id="passwordGuide">영문, 숫자, 특수문자를 섞으면 더 안전합니다.</p>
                        </div>

                        <div class="input-group">
                            <label for="newPasswordConfirm">새 비밀번호 확인</label>
                            <div class="password-box">
                                <input
                                        type="password"
                                        id="newPasswordConfirm"
                                        placeholder="비밀번호를 한 번 더 입력해주세요"
                                        autocomplete="new-password">
                                <button type="button" class="toggle-password" data-target="#newPasswordConfirm">👁</button>
                            </div>
                            <p class="field-message" id="passwordConfirmGuide">비밀번호 확인을 입력해주세요.</p>
                        </div>
                    </div>

                    <button type="submit" class="reset-btn" id="resetPasswordBtn" disabled>비밀번호 재설정</button>
                </form>

                <div class="login-link">
                    비밀번호가 생각나셨나요?
                    <a href="login.html">로그인으로 돌아가기</a>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div id="footer"></div>
    </footer>
</body>

<script src="js/include.js"></script>
<script src="js/jquery.min.js"></script>
<script src="js/config.js"></script>
<script src="js/forgot-password.js"></script>
<script src="component/header.js"></script>
</html>
