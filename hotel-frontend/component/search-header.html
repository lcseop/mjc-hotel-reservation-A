<section class="global-search-top" aria-label="호텔 검색">
    <div class="global-search-bar">
        <div class="global-search-field location">
            <label for="globalSearchLocation">여행지 / 호텔명</label>
            <div class="global-location-wrap">
                <input type="text" id="globalSearchLocation" placeholder="서울특별시" autocomplete="off" aria-controls="globalSearchSuggestions" aria-expanded="false">
                <div class="global-search-suggestions" id="globalSearchSuggestions" role="listbox" hidden></div>
            </div>
        </div>

        <div class="global-search-field global-date-range-field">
            <label>숙박 기간</label>
            <button type="button" class="global-date-toggle" id="globalDateRangeToggle" aria-expanded="false" aria-controls="globalDateRangePicker">
                <span id="globalDateRangeText">날짜 선택</span>
                <i class="fa-regular fa-calendar-days" aria-hidden="true"></i>
            </button>
            <input type="hidden" id="globalSearchCheckIn">
            <input type="hidden" id="globalSearchCheckOut">
            <div class="global-date-picker" id="globalDateRangePicker" hidden></div>
        </div>

        <div class="global-search-field">
            <label for="globalSearchAdult">성인</label>
            <input type="number" id="globalSearchAdult" min="1" max="10" value="2">
        </div>

        <div class="global-search-field">
            <label for="globalSearchChild">아이</label>
            <input type="number" id="globalSearchChild" min="0" max="10" value="0">
        </div>

        <button type="button" id="globalSearchBtn">
            <i class="fa-solid fa-magnifying-glass"></i>
            검색
        </button>
    </div>
</section>
