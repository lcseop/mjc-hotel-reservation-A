services:
  mariadb:
    image: mariadb:11.4
    container_name: staynow-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-hotel}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-1234}
      TZ: Asia/Seoul
    ports:
      - "${MARIADB_PORT:-33306}:3306"
    volumes:
      - staynow-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: staynow-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mjc813pass}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-mjc813pass}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - staynow-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${DOCKERHUB_USERNAME:-staynow}/staynow-hotel-api:${APP_IMAGE_TAG:-latest}
    build:
      context: ./hotel
      dockerfile: Dockerfile
    container_name: staynow-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      SERVER_PORT: 33000
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-oauth}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      OAUTH2_FRONTEND_CALLBACK_URL: ${OAUTH2_FRONTEND_CALLBACK_URL:-http://localhost/oauth-callback.html}
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE:-hotel}
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_ROOT_PASSWORD:-1234}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-mjc813pass}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6}
      FILE_UPLOAD_DIR: /app/uploads
      REVIEW_IMAGES: /app/uploads/review/
      ROOM_IMAGES: /app/uploads/room/
      HOTEL_IMAGES: /app/uploads/hotel/
      TOUR_API_SERVICE_KEY: ${TOUR_API_SERVICE_KEY:-}
    ports:
      - "${APP_PORT:-33000}:33000"
    volumes:
      - staynow-upload-data:/app/uploads

  frontend:
    image: ${DOCKERHUB_USERNAME:-staynow}/staynow-hotel-frontend:${FRONT_IMAGE_TAG:-latest}
    build:
      context: ./hotel-frontend
      dockerfile: Dockerfile
    container_name: staynow-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${FRONT_PORT:-80}:80"

volumes:
  staynow-mariadb-data:
  staynow-redis-data:
  staynow-upload-data:
